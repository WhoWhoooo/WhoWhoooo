      <circle r="32" fill="#0f766e" stroke="#5eead4" stroke-width="2"/>
      <text text-anchor="middle" dominant-baseline="central" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffffff">GLM</text>
    </g>
