      <animateMotion dur="18s" repeatCount="indefinite" begin="0s"><mpath href="#tokenPath" xlink:href="#tokenPath"/></animateMotion>
      <circle r="32" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
      <use href="#deepseekIcon" xlink:href="#deepseekIcon" width="26" height="26" x="-13" y="-13" fill="#ffffff"/>
    </g>
    <g>
      <animateMotion dur="18s" repeatCount="indefinite" begin="-6s"><mpath href="#tokenPath" xlink:href="#tokenPath"/></animateMotion>
      <circle r="32" fill="#4c1d95" stroke="#c4b5fd" stroke-width="2"/>
      <use href="#qwenIcon" xlink:href="#qwenIcon" width="27" height="27" x="-13.5" y="-13.5" fill="#ffffff"/>
    </g>
    <g>
