    <text x="600" y="112" fill="#ffffff" font-size="54" font-weight="800" letter-spacing="1">AI Agent Builder</text>
    <text x="600" y="154" fill="#c7d2fe" font-size="20" font-weight="500">C++ / Python · AI Infra · Applied AI Systems</text>
    <text x="600" y="190" fill="#dbeafe" font-size="16" opacity="0.88">DeepSeek · Qwen · GLM</text>
