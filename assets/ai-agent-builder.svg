  <path d="M0 244 C 150 182, 300 182, 450 244 S 750 306, 900 244 S 1050 182, 1200 244 V320 H0 Z" fill="#0f172a" opacity="0.45"/>
  <path d="M0 252 C 150 190, 300 190, 450 252 S 750 314, 900 252 S 1050 190, 1200 252" fill="none" stroke="#93c5fd" stroke-width="2" opacity="0.55"/>

  <g filter="url(#softShadow)">
